                        "voltage_a": "{{voltage_a}}",
                        "voltage_b": "{{voltage_b}}",
                        "voltage_c": "{{voltage_c}}"
                      }
                    }
                  }
                ],
                "enabled": true
              }
            ],
            "commands": [
              {
                "identifier": "reset_energy",
                "name": "Reset Energy",
                "description": "Reset energy accumulator",
                "parameters": []
              }
            ]
