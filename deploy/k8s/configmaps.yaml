apiVersion: v1
kind: ConfigMap
metadata:
  name: device-meter-config
  namespace: ithings
data:
  meter-config-integration.json: |
    {
      "device_name": "modbus-meter-1",
      "device_type": "modbus-meter",
      "poll_interval_ms": 1000,
      "driver": {
        "enabled": true,
        "server_address": "tcp://172.25.219.101:5555"
      },
      "logging": {
        "level": "info",
        "format": "json"
      },
      "custom": {
        "thing_model": {
          "model_id": "modbus-temperature-sensor.1.0",
          "model_version": "1.0",
          "device_type": "temperature-sensor",
          "manufacturer": "EdgeX",
          "description": "Modbus temperature and humidity sensor",
          "properties": [
            {
              "identifier": "temperature",
              "name": "Temperature",
              "type": "float",
              "unit": "°C",
              "access": "R",
              "range": [-40, 120],
              "default_value": 0,
              "description": "Current temperature reading"
            },
            {
              "identifier": "humidity",
              "name": "Humidity",
              "type": "float",
              "unit": "%RH",
              "access": "R",
              "range": [0, 100],
              "default_value": 0,
              "description": "Current humidity reading"
            },
            {
              "identifier": "relay_status",
              "name": "Relay Status",
              "type": "bool",
              "access": "RW",
              "default_value": false,
              "description": "Relay on/off status"
            }
          ],
          "events": [
            {
              "identifier": "high_temperature",
              "name": "High Temperature",
              "level": "WARN",
              "output_params": [
                {
                  "identifier": "temperature",
                  "name": "Current Temperature",
                  "type": "float"
                }
              ],
              "description": "Triggered when temperature exceeds 30°C"
            }
          ],
          "rules": [
            {
              "identifier": "high_temp_alarm",
              "name": "High Temperature Alarm",
              "conditions": [
                {
                  "property_identifier": "temperature",
                  "operator": ">",
                  "value": 30
                }
              ],
              "condition_logic": "and",
              "actions": [
                {
                  "trigger_event": {
                    "event_identifier": "high_temperature",
                    "data": {
                      "temperature": "{{temperature}}"
                    }
                  }
                }
              ],
              "enabled": true
            }
          ]
        }
      }
    }